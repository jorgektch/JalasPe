<div class="flex h-screen bg-[#f8f9fa] font-sans text-jalaspe-blue">
  
  <app-sidebar></app-sidebar>

  <main class="flex-1 flex flex-col overflow-hidden relative">
    
    <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-8 z-0">
      <h2 class="text-xl font-semibold text-jalaspe-blue">Configuración de Cuenta</h2>
      <div class="flex items-center bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 hidden sm:flex">
        <span class="text-sm font-semibold text-jalaspe-blue">{{ usuarioEmail }}</span>
        <div class="w-7 h-7 rounded-full bg-jalaspe-blue text-white flex items-center justify-center ml-3 text-xs font-bold shadow-sm">
          {{ usuarioEmail ? usuarioEmail.charAt(0).toUpperCase() : 'U' }}
        </div>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8">
      
      <div class="max-w-4xl mx-auto mb-8">
        <h3 class="text-3xl font-bold text-jalaspe-blue tracking-tight">Mi Perfil</h3>
        <p class="text-jalaspe-grey mt-2">Gestiona tu identidad, datos de contacto y la seguridad de tu cuenta.</p>
      </div>

      <div class="max-w-4xl mx-auto space-y-8">

        <form (submit)="guardarDatosPersonales($event)">
          
          <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100 p-6 md:p-8 mb-6">
            <h4 class="text-lg font-bold text-jalaspe-blue mb-6 border-b border-gray-100 pb-2">Identidad del Viajero</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Nombres</label>
                <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="Jorge Jesús" required>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">A. Paterno</label>
                  <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="Quispe" required>
                </div>
                <div>
                  <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">A. Materno</label>
                  <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="Villaverde" required>
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Nombre de Usuario (Username)</label>
                <div class="flex">
                  <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-200 bg-gray-100 text-gray-500 text-sm font-bold">@</span>
                  <input type="text" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-r-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="jorgequispe">
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Fecha de Nacimiento</label>
                <input type="date" value="1989-12-18" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue">
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-gray-100 p-6 md:p-8 mb-6">
            <h4 class="text-lg font-bold text-jalaspe-blue mb-6 border-b border-gray-100 pb-2">Contacto y Ubicación</h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Correo Electrónico <span class="text-xs text-gray-400 font-normal ml-1">(No modificable)</span></label>
                <input type="email" [value]="usuarioEmail" disabled class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl outline-none text-gray-500 cursor-not-allowed">
              </div>
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Número de Celular</label>
                <input type="tel" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="+51 987 654 321">
              </div>
              
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">País</label>
                <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue">
                  <option value="PE" selected>Perú</option>
                  <option value="MX">México</option>
                  <option value="CO">Colombia</option>
                  <option value="CL">Chile</option>
                  <option value="AR">Argentina</option>
                  <option value="OTRO">Otro país</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Ciudad</label>
                <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="Lima">
              </div>

              <div class="md:col-span-2">
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Dirección Exacta</label>
                <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue" placeholder="Av. Principal 123, Urb. Los Viajeros">
              </div>
            </div>

            <div class="flex justify-end pt-8">
              <button type="submit" class="bg-jalaspe-blue hover:bg-[#00223a] text-white px-8 py-3.5 rounded-xl font-medium transition-all shadow-md shadow-jalaspe-blue/20 flex items-center active:scale-[0.98]">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Guardar Información
              </button>
            </div>
          </div>
        </form>

        <form (submit)="cambiarPassword($event)">
          <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-red-100 p-6 md:p-8">
            <h4 class="text-lg font-bold text-red-600 mb-6 border-b border-red-50 pb-2 flex items-center">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
              Seguridad de la Cuenta
            </h4>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Contraseña Actual</label>
                <input type="password" id="actualPass" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-400 transition-all outline-none text-jalaspe-blue" placeholder="••••••••" required>
              </div>
              <div class="hidden md:block"></div> <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Nueva Contraseña</label>
                <input type="password" id="nuevaPass" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-400 transition-all outline-none text-jalaspe-blue" placeholder="••••••••" minlength="6" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Confirmar Nueva Contraseña</label>
                <input type="password" id="confirmarPass" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-400 transition-all outline-none text-jalaspe-blue" placeholder="••••••••" minlength="6" required>
              </div>
            </div>

            <div class="flex justify-end pt-6">
              <button type="submit" class="bg-white border-2 border-red-500 text-red-500 hover:bg-red-50 px-6 py-3 rounded-xl font-medium transition-all flex items-center active:scale-[0.98]">
                Actualizar Contraseña
              </button>
            </div>
          </div>
        </form>

      </div>
    </div>
  </main>
</div>
