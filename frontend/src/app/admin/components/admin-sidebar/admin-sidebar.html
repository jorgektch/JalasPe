<!-- ================= MOBILE HEADER GLOBAL (/admin) ================= -->
<header class="md:hidden fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-100 z-40 flex items-center justify-between px-4 shadow-sm">
    <!-- Izquierda: Hamburguesa -->
    <button (click)="toggleMenu()" class="text-jalaspe-blue p-1.5 focus:outline-none hover:bg-gray-50 rounded-lg transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    
    <!-- Centro: Logo Jalas.Pe + Staff -->
    <a routerLink="/admin/dashboard" (click)="cerrarMenu()" class="absolute left-1/2 -translate-x-1/2 flex items-center cursor-pointer">
        <h1 class="text-xl font-bold text-jalaspe-blue tracking-tight">Jalas<span class="text-jalaspe-lime">.Pe</span></h1>
        <span class="ml-2 px-1.5 py-0.5 bg-red-100 text-red-600 text-[9px] font-black rounded uppercase tracking-wider">Staff</span>
    </a>

    <!-- Derecha: Inicial del Perfil -->
    <a routerLink="/admin/perfil" class="w-8 h-8 rounded-full bg-jalaspe-blue text-white flex items-center justify-center text-xs font-bold shadow-sm cursor-pointer hover:scale-105 transition-transform">
        {{ inicialUsuario }}
    </a>
</header>

<!-- ================= BACKDROP OSCURO MÓVIL ================= -->
<div *ngIf="menuAbierto" (click)="cerrarMenu()" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-40 md:hidden transition-opacity"></div>

<!-- ================= SIDEBAR / DRAWER ================= -->
<aside class="fixed inset-y-0 left-0 z-50 w-64 h-full bg-white border-r border-gray-200 flex flex-col transition-transform duration-300 ease-in-out transform shadow-[4px_0_24px_rgb(0,0,0,0.02)] md:relative md:translate-x-0"
       [class.-translate-x-full]="!menuAbierto"
       [class.translate-x-0]="menuAbierto">
    
    <!-- CABECERA DEL MENÚ Y LOGO (Desktop & Drawer Mobile) -->
    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-100 flex-shrink-0">
        <a routerLink="/admin/dashboard" (click)="cerrarMenu()" class="flex items-center cursor-pointer hover:scale-105 transition-transform" title="Volver al inicio">
            <h1 class="text-2xl font-bold text-jalaspe-blue tracking-tight">Jalas<span class="text-jalaspe-lime">.Pe</span></h1>
            <span class="ml-2 px-1.5 py-0.5 bg-red-100 text-red-600 text-[10px] font-black rounded uppercase tracking-wider">Staff</span>
        </a>
        <button (click)="cerrarMenu()" class="md:hidden text-gray-400 hover:text-jalaspe-blue focus:outline-none transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <!-- NAVEGACIÓN PRINCIPAL -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <!-- Dashboard -->
        <a routerLink="/admin/dashboard" (click)="cerrarMenu()" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            Panel General
        </a>

        <!-- Proveedores -->
        <a routerLink="/admin/proveedores" (click)="cerrarMenu()" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            Proveedores
        </a>

        <!-- Usuarios y Planes -->
        <a routerLink="/admin/usuarios" (click)="cerrarMenu()" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Usuarios y Planes
        </a>

        <!-- Ciudades y Cobertura -->
        <a routerLink="/admin/cobertura" (click)="cerrarMenu()" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Ciudades y Cobertura
        </a>

        <!-- Configuración e IA -->
        <a routerLink="/admin/configuracion" (click)="cerrarMenu()" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Configuración e IA
        </a>

        <!-- Mi Perfil -->
        <a routerLink="/admin/perfil" (click)="cerrarMenu()" routerLinkActive="bg-jalaspe-blue/5 text-jalaspe-blue font-semibold" class="flex items-center px-4 py-3 mt-4 text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors group relative overflow-hidden">
            <svg class="w-5 h-5 mr-3 group-hover:text-jalaspe-blue transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            Mi Perfil
        </a>
    </nav>

    <!-- UTILIDADES -->
    <div class="p-4 border-t border-gray-100 flex-shrink-0 space-y-2 bg-gray-50/30">
        <a routerLink="/" class="w-full flex items-center px-4 py-2.5 text-sm font-medium text-jalaspe-grey hover:bg-gray-50 hover:text-jalaspe-blue rounded-xl transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Ir al sitio web
        </a>

        <button (click)="cerrarSesion()" class="w-full flex items-center px-4 py-2.5 text-sm font-medium text-red-500 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Cerrar Sesión
        </button>
    </div>
</aside>
