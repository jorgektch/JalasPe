<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- COLUMNA IZQUIERDA: FORMULARIO -->
    <div class="lg:col-span-1">
        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 sticky top-24">
            <h3 class="text-lg font-bold text-jalaspe-blue mb-4">Nueva Habitación</h3>
            <form (submit)="guardarHabitacion($event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Tipo</label>
                    <select [(ngModel)]="nuevaHabitacion.tipo" name="tipo"
                        class="w-full px-3 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-jalaspe-blue/20 outline-none text-sm text-jalaspe-blue font-medium"
                        required>
                        <option value="Habitación Simple">Simple</option>
                        <option value="Habitación Doble">Doble</option>
                        <option value="Habitación Matrimonial">Matrimonial</option>
                        <option value="Suite">Suite</option>
                        <option value="Departamento">Departamento / Bungalow</option>
                    </select>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Capacidad</label>
                        <input type="number" [(ngModel)]="nuevaHabitacion.capacidad" name="capacidad" min="1" max="10"
                            class="w-full px-3 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-jalaspe-blue/20 outline-none text-sm text-jalaspe-blue"
                            required>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Precio (S/)</label>
                        <input type="number" [(ngModel)]="nuevaHabitacion.precio_noche" name="precio" min="1" step="0.5"
                            class="w-full px-3 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-jalaspe-blue/20 outline-none text-sm text-jalaspe-blue font-bold"
                            required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Servicios (Amenities)</label>
                    <input type="text" [(ngModel)]="nuevaHabitacion.amenities" name="amenities"
                        placeholder="Ej. Wifi, TV, Frigobar"
                        class="w-full px-3 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-jalaspe-blue/20 outline-none text-sm text-jalaspe-blue">
                </div>
                <button type="submit" [disabled]="guardando"
                    class="w-full py-2.5 bg-jalaspe-blue text-white text-sm font-bold rounded-xl hover:bg-[#00223a] transition-colors flex justify-center items-center mt-2">
                    {{ guardando ? 'Guardando...' : '+ Agregar al Catálogo' }}
                </button>
            </form>
        </div>
    </div>

    <!-- COLUMNA DERECHA: LISTADO DE HABITACIONES -->
    <div class="lg:col-span-2">
        <div *ngIf="cargando" class="py-10 text-center text-gray-400 animate-pulse">Cargando catálogo...</div>

        <div *ngIf="!cargando && habitaciones.length === 0" class="bg-gray-50 border border-gray-100 border-dashed rounded-2xl py-12 flex flex-col items-center justify-center text-gray-400">
            <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <p>Aún no hay habitaciones registradas.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div *ngFor="let h of habitaciones" class="bg-white border border-gray-200 rounded-2xl p-5 hover:shadow-md transition-shadow relative group">
                <div class="flex justify-between items-start mb-2">
                    <span class="px-2.5 py-1 bg-purple-50 text-purple-600 rounded-md text-[10px] font-bold uppercase tracking-wider border border-purple-100">{{ h.tipo }}</span>
                    <!-- BOTÓN DE ELIMINAR RESTAURADO -->
                    <button (click)="abrirModalEliminar(h.id)" class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
                <div class="flex items-end justify-between mt-4">
                    <div>
                        <div class="flex items-center text-gray-500 text-xs mb-1">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            {{ h.capacidad }} Personas
                        </div>
                        <p class="text-[11px] text-gray-400 line-clamp-1">{{ h.amenities }}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Por Noche</p>
                        <p class="text-xl font-black text-jalaspe-blue">S/ {{ h.precio_noche }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMACIÓN UBICADO FUERA DEL BUCLE -->
<div *ngIf="mostrarModalEliminar" class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-0">
    <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity" (click)="!eliminandoItem ? cerrarModalEliminar() : null"></div>
    <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full relative z-10 overflow-hidden animate-in fade-in zoom-in duration-200">
        <div class="p-6 text-center">
            <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-jalaspe-blue mb-2">¿Estás seguro?</h3>
            <p class="text-sm text-gray-500 mb-6">Esta acción no se puede deshacer. El elemento será eliminado permanentemente del catálogo.</p>
            <div class="flex flex-col sm:flex-row gap-3">
                <button type="button" [disabled]="eliminandoItem" (click)="cerrarModalEliminar()" class="w-full px-4 py-2.5 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium rounded-xl transition-colors">Cancelar</button>
                <button type="button" [disabled]="eliminandoItem" (click)="confirmarEliminacion()" class="w-full px-4 py-2.5 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors flex items-center justify-center">
                    <svg *ngIf="eliminandoItem" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    {{ eliminandoItem ? 'Eliminando...' : 'Sí, eliminar' }}
                </button>
            </div>
        </div>
    </div>
</div>
