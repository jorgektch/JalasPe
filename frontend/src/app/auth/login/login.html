<div class="min-h-screen flex items-center justify-center bg-gray-50 font-sans px-4">
  <div class="bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-md w-full border border-gray-100">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-jalaspe-blue tracking-tight mb-2">Jalas.Pe</h1>
      <p class="text-jalaspe-grey text-sm">Bienvenido de vuelta, viajero</p>
    </div>

    <form (submit)="iniciarSesion($event)">
      
      <div class="mb-5">
        <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Correo Electrónico</label>
        <input type="email" id="email" 
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue placeholder-gray-400" 
          placeholder="ejemplo@correo.com" required>
      </div>

      <div class="mb-8">
        <label class="block text-sm font-medium text-jalaspe-blue mb-1.5">Contraseña</label>
        <input type="password" id="password" 
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-jalaspe-blue/20 focus:border-jalaspe-blue transition-all outline-none text-jalaspe-blue placeholder-gray-400" 
          placeholder="••••••••" required>
        
        <div class="flex justify-end mt-2">
          <a href="#" class="text-xs text-jalaspe-grey hover:text-jalaspe-blue transition-colors">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <button type="submit" 
        class="w-full bg-jalaspe-blue hover:bg-[#00223a] text-white font-medium py-3.5 px-4 rounded-xl shadow-md shadow-jalaspe-blue/20 transition-all active:scale-[0.98]">
        Ingresar
      </button>
    </form>

    <p class="text-center text-sm text-jalaspe-grey mt-8">
      ¿No tienes cuenta? 
      <a routerLink="/auth/registro" class="text-jalaspe-blue font-semibold hover:text-jalaspe-lime transition-colors">
        Regístrate aquí
      </a>
    </p>

  </div>
</div>
