name: Deploy to Firebase Hosting and Cloud Run on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Autenticación con Google Cloud usando tu secreto existente
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JALASPE }}

      # 2. Configurar Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Construir y Desplegar el Backend a Google Cloud Run
      - name: Deploy Backend to Cloud Run
        run: |
          cd backend
          gcloud run deploy jalaspe-backend \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --project jalaspe

      # 4. Construir Angular
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build

      # 5. Desplegar Angular a Firebase Hosting
      - name: Deploy Frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JALASPE }}
          channelId: live
          projectId: jalaspe
          entryPoint: ./frontend