name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
        
      # ---> EL TRUCO DE DEVOPS: Forzar hash único <---
      - name: Force unique deploy hash
        run: echo "Deploy $(date)" > frontend/dist/frontend/browser/deploy-version.txt
        
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JALASPE }}'
          projectId: jalaspe
          entryPoint: ./frontend