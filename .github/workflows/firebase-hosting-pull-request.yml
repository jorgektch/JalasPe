name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 4. Construir Angular
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build

      # ---> EL TRUCO DE DEVOPS: Usar el ID único de GitHub <---
      - name: Force unique deploy hash
        run: echo "${{ github.run_id }}-${{ github.sha }}" > frontend/dist/frontend/browser/github-deploy-id.txt

      # 5. Desplegar Angular a Firebase Hosting
      - name: Deploy Frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JALASPE }}
          channelId: live
          projectId: jalaspe
          entryPoint: ./frontend